    - data:
        code: "import json\n\ndef main(body: str, order_id: str) -> dict:\n    try:\n        data = json.loads(body or \"{}\")\n    except Exception:\n        return {\n            \"tool_ok\": \"false\",\n            \"order_id\": order_id or \"\",\n            \"need_order_id\": \"false\",\n            \"tool_error\": \"订单接口返回无法解析\",\n            \"order_json\": \"\"\n        }\n    if data.get(\"ok\") and data.get(\"data\"):\n        return {\n            \"tool_ok\": \"true\",\n            \"order_id\": order_id or str(data[\"data\"].get(\"order_id\") or \"\"),\n            \"need_order_id\": \"false\",\n            \"tool_error\": \"\",\n            \"order_json\": json.dumps(data[\"data\"], ensure_ascii=False)\n        }\n    err = data.get(\"error\") or data.get(\"assistant_hint\") or \"查询失败\"\n    return {\n        \"tool_ok\": \"false\",\n        \"order_id\": order_id or \"\",\n        \"need_order_id\": \"false\",\n        \"tool_error\": str(err),\n        \"order_json\": json.dumps(data, ensure_ascii=False) if data else \"\"\n    }\n"
